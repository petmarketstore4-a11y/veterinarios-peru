<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetLife - Veterinarios Perú</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* HEADER */
header{
background:#1e7d32;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* PANEL */
#panel{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:10px;
background:white;
}

#panel input{
padding:10px;
width:220px;
border-radius:8px;
border:1px solid #ccc;
}

#panel button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e7d32;
color:white;
font-weight:bold;
}

#panel button:hover{
opacity:0.9;
}

/* STATS */
#estadisticas{
text-align:center;
padding:8px;
background:white;
font-weight:bold;
}

/* MAP */
#map{
height:80vh;
width:100%;
}

/* PANEL INFO */
#info{
position:fixed;
right:10px;
top:120px;
width:260px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
display:none;
}

@media(max-width:768px){
#info{
position:relative;
width:95%;
margin:10px auto;
top:auto;
right:auto;
}
}

</style>
</head>

<body>

<header>🐾 PetLife Veterinarios Perú</header>

<div id="panel">

<input id="buscar" placeholder="Buscar veterinaria...">

<button onclick="buscar()">🔍 Buscar</button>
<button onclick="reset()">🇵🇪 Todo Perú</button>
<button onclick="costa()">🌊 Costa</button>
<button onclick="sierra()">🏔️ Sierra</button>
<button onclick="selva()">🌴 Selva</button>
<button onclick="geo()">📍 Cerca de mí</button>

</div>

<div id="estadisticas">
📊 Veterinarias: <span id="contador">0</span>
</div>

<div id="map"></div>

<div id="info"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-9.19,-75],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];

const query = `
[out:json][timeout:60];
(
node["amenity"="veterinary"](-18,-82,0,-68);
way["amenity"="veterinary"](-18,-82,0,-68);
relation["amenity"="veterinary"](-18,-82,0,-68);
);
out center;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(r=>r.json())
.then(data=>{

let count=0;

data.elements.forEach(v=>{

const lat=v.lat||v.center?.lat;
const lon=v.lon||v.center?.lon;
if(!lat||!lon) return;

const tags=v.tags||{};
const name=(tags.name||"Veterinaria");

count++;

let m=L.marker([lat,lon]).addTo(map);

m.data={name,lat,lon,tags};

m.on("click",()=>show(m.data));

markers.push(m);

});

document.getElementById("contador").innerText=count;

});

function show(v){

document.getElementById("info").style.display="block";

document.getElementById("info").innerHTML=`
<h3>🏥 ${v.name}</h3>
📍 ${v.tags["addr:street"]||"No disponible"}<br>
📞 ${v.tags.phone||"No disponible"}<br>
🕒 ${v.tags.opening_hours||"No disponible"}<br>
🌐 ${v.tags.website||"No disponible"}<br>
`;

map.setView([v.lat,v.lon],15);
}

function clearMarkers(){
markers.forEach(m=>map.removeLayer(m));
markers=[];
}

function buscar(){
let txt=document.getElementById("buscar").value.toLowerCase();

markers.forEach(m=>{
if(m.data.name.toLowerCase().includes(txt)){
map.setView([m.data.lat,m.data.lon],15);
m.openPopup();
show(m.data);
}
});
}

function reset(){
map.setView([-9.19,-75],6);
}

function costa(){
map.setView([-12,-76],6);
}

function sierra(){
map.setView([-10,-74],6);
}

function selva(){
map.setView([-5,-75],6);
}

function geo(){
navigator.geolocation.getCurrentPosition(pos=>{
map.setView([pos.coords.latitude,pos.coords.longitude],14);
L.marker([pos.coords.latitude,pos.coords.longitude])
.addTo(map)
.bindPopup("📍 Tú").openPopup();
});
}

</script>

</body>
</html>
