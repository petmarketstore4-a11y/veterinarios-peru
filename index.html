<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetLife V21 - Veterinarias Perú</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
background:#140f0e;
color:white;
}

header{
background:#2f201d;
padding:10px;
text-align:center;
color:#ffb347;
font-weight:bold;
}

.container{
display:flex;
height:90vh;
}

#map{
flex:2;
}

#panel{
flex:1;
background:#1f1614;
padding:10px;
overflow:auto;
border-left:2px solid #ff8c42;
}

.card{
background:#2f201d;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ff8c42;
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
box-sizing:border-box;
}

button{
background:#ff8c42;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
width:100%;
}
</style>
</head>

<body>

<header>🐾 PetLife V21 - Veterinarias Perú + Reseñas Reales</header>

<div class="container">

<div id="map"></div>

<div id="panel">

<h3>📍 Veterinaria seleccionada</h3>
<div id="info">Haz clic en un marcador</div>

<hr>

<h3>⭐ Crear reseña</h3>

<textarea id="texto" placeholder="Escribe tu reseña..."></textarea>
<input id="estrellas" type="number" min="1" max="5" placeholder="Estrellas (1-5)">
<button onclick="guardarResena()">Enviar reseña</button>

<hr>

<h3>📢 Reseñas</h3>
<div id="resenas"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "petlife-bf923.firebaseapp.com",
  projectId: "petlife-bf923"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userEmail = "";
let vetActual = "";

/* 🔐 PROTEGER ACCESO */
auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="login.html";
}else{
userEmail = user.email;
}
});

/* 🗺️ MAPA */
const map = L.map('map').setView([-9.19,-75.01],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* 🏥 CARGAR VETERINARIAS */
fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:`
[out:json];
node["amenity"="veterinary"](-18,-82,0,-68);
out;
`
})
.then(r=>r.json())
.then(data=>{

data.elements.forEach(v=>{

const lat = v.lat;
const lon = v.lon;
if(!lat || !lon) return;

const name = v.tags?.name || "Veterinaria sin nombre";

/* marcador */
L.marker([lat,lon]).addTo(map)
.on("click",()=>{

vetActual = name;

document.getElementById("info").innerHTML = `
<div class="card">
<h3>🏥 ${name}</h3>
<p>📍 Lista para reseñas</p>
</div>
`;

cargarResenas(name);

});

});

});

/* 💾 GUARDAR RESEÑA */
function guardarResena(){

if(!vetActual){
alert("Selecciona una veterinaria primero");
return;
}

const texto = document.getElementById("texto").value;
const estrellas = document.getElementById("estrellas").value;

if(!texto) return;

db.collection("resenas").add({
vet: vetActual,
user: userEmail,
texto: texto,
estrellas: estrellas,
fecha: new Date().toLocaleString()
});

document.getElementById("texto").value = "";
document.getElementById("estrellas").value = "";

cargarResenas(vetActual);
}

/* 📢 CARGAR RESEÑAS */
function cargarResenas(vet){

db.collection("resenas")
.where("vet","==",vet)
.get()
.then(snapshot=>{

let html="";

snapshot.forEach(doc=>{
const d = doc.data();

html += `
<div class="card">
⭐ ${d.estrellas}/5<br>
${d.texto}<br>
👤 ${d.user}
</div>
`;
});

document.getElementById("resenas").innerHTML =
html || "Sin reseñas aún";

});

}

</script>

</body>
</html>
