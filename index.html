<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetLife v13 Pro Maps</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#140f0e;
color:white;
}

/* HEADER */
header{
background:#3b2f2f;
color:#ffb347;
padding:12px;
text-align:center;
font-weight:bold;
}

/* PANEL */
#panel{
display:flex;
gap:6px;
flex-wrap:wrap;
justify-content:center;
padding:10px;
background:#241a18;
position:sticky;
top:0;
z-index:1000;
}

#panel input{
padding:8px;
border:none;
border-radius:8px;
width:180px;
}

#panel button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#ff8c42;
font-weight:bold;
cursor:pointer;
}

/* LAYOUT */
.app{
display:flex;
height:80vh;
}

#map{flex:2;}
#info{
flex:1;
background:#1f1614;
padding:10px;
overflow:auto;
border-left:2px solid #ff8c42;
}

/* CARD */
.card{
background:#2f201d;
border:1px solid #ff8c42;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

/* IMAGE */
.vet-img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:8px;
}

/* BUTTON */
.btn{
padding:6px;
border:none;
border-radius:6px;
background:#ff8c42;
cursor:pointer;
margin-top:5px;
}

/* MOBILE */
@media(max-width:768px){
.app{flex-direction:column;}
#map{height:55vh;}
#info{height:45vh;}
}

</style>

</head>

<body>

<header>🐾 PetLife v13 Pro Maps (Google Maps Clone)</header>

<div id="panel">
<input id="search" placeholder="Buscar veterinaria...">
<button onclick="buscar()">🔍</button>
<button onclick="reset()">🇵🇪</button>
<button onclick="geo()">📍 Cerca</button>
</div>

<div class="app">
<div id="map"></div>
<div id="info">
<div class="card">🧠 Selecciona una veterinaria</div>
</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* MAPA */
const map = L.map('map').setView([-9.2,-75],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers = [];

/* DATA OPENSTREETMAP */
const query = `
[out:json][timeout:60];
(
node["amenity"="veterinary"](-18,-82,0,-68);
);
out center;
`;

/* FUNCION DATOS INTELIGENTES */
function smart(tags){

return {
dir:
tags["addr:street"] ||
tags["addr:city"] ||
"📍 No registrada",

phone:
tags.phone ||
tags["contact:phone"] ||
"📞 No registrado",

hours:
tags.opening_hours ||
"🕒 No disponible",

web:
tags.website || null,
fb:
tags.facebook || null,
ig:
tags.instagram || null
};

}

/* CARGA DATOS */
fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:query
})
.then(r=>r.json())
.then(data=>{

data.elements.forEach(v=>{

const lat=v.lat||v.center?.lat;
const lon=v.lon||v.center?.lon;
if(!lat||!lon) return;

const name=v.tags?.name||"Veterinaria";

let m=L.marker([lat,lon]).addTo(map);

m.data={lat,lon,name,tags:v.tags};

m.on("click",()=>show(m.data));

markers.push(m);

});

});

/* SHOW COMPLETO */
function show(v){

map.setView([v.lat,v.lon],16);

const d = smart(v.tags);

const img = `https://source.unsplash.com/600x400/?veterinary,pet,clinic,${encodeURIComponent(v.name)}`;

let redes = "";

if(d.web) redes += `🌐 <a target="_blank" href="${d.web}">Web</a><br>`;
if(d.fb) redes += `📘 Facebook<br>`;
if(d.ig) redes += `📸 Instagram<br>`;
if(!redes) redes = "🌐 Sin redes registradas";

document.getElementById("info").innerHTML = `
<div class="card">

<img class="vet-img" src="${img}" onerror="this.src='https://source.unsplash.com/600x400/?vet,animal'">

<h2>🏥 ${v.name}</h2>

<p>🐾 Clínica veterinaria registrada en PetLife</p>

<hr>

📍 ${d.dir}<br>
📞 ${d.phone}<br>
🕒 ${d.hours}<br>

<hr>

<h3>🌐 Redes</h3>
${redes}

<a target="_blank"
href="https://www.google.com/maps?q=${v.lat},${v.lon}">
<button class="btn">🧭 Cómo llegar</button>
</a>

</div>
`;

}

/* BUSCAR */
function buscar(){

let q = document.getElementById("search").value.toLowerCase();

markers.forEach(m=>{
if(m.data.name.toLowerCase().includes(q)){
map.setView([m.data.lat,m.data.lon],16);
show(m.data);
}
});

}

/* GEO */
function geo(){

navigator.geolocation.getCurrentPosition(pos=>{

map.setView([pos.coords.latitude,pos.coords.longitude],14);

L.marker([pos.coords.latitude,pos.coords.longitude])
.addTo(map)
.bindPopup("📍 Tú estás aquí")
.openPopup();

});

}

/* RESET */
function reset(){
map.setView([-9.2,-75],6);
}

</script>

</body>
</html>
