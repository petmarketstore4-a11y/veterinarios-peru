<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetLife v11 Ultimate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#140f0e;
color:white;
}

/* HEADER */
header{
background:#3b2f2f;
color:#ffb347;
padding:12px;
text-align:center;
font-weight:bold;
}

/* PANEL */
#panel{
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
padding:10px;
background:#241a18;
position:sticky;
top:0;
z-index:1000;
}

#panel input{
padding:8px;
width:180px;
border:none;
border-radius:8px;
outline:none;
}

#panel button{
padding:8px 10px;
border:none;
border-radius:8px;
background:#ff8c42;
color:black;
font-weight:bold;
cursor:pointer;
}

/* LOADING */
#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2a1f1f;
padding:12px;
border-radius:10px;
z-index:2000;
color:#ffb347;
}

/* APP */
.app{
display:flex;
height:80vh;
}

#map{
flex:2;
}

#sidebar{
flex:1;
background:#1f1614;
border-left:2px solid #ff8c42;
display:flex;
flex-direction:column;
}

#info{
padding:10px;
overflow:auto;
}

/* CARD */
.card{
background:#2f201d;
border:1px solid #ff8c42;
padding:10px;
border-radius:12px;
margin-bottom:10px;
}

/* IMAGE */
.vet-img{
width:100%;
height:120px;
border-radius:10px;
object-fit:cover;
margin-bottom:8px;
}

/* BUTTON */
.btn{
padding:6px;
border:none;
border-radius:6px;
background:#ff8c42;
cursor:pointer;
margin-top:5px;
}

@media(max-width:768px){
.app{flex-direction:column;}
#map{height:55vh;}
#sidebar{height:45vh;border-left:none;border-top:2px solid #ff8c42;}
}

</style>
</head>

<body>

<header>🐾 PetLife v11 Ultimate IA</header>

<div id="panel">
<input id="search" placeholder="Buscar veterinaria...">
<button onclick="search()">🔍</button>
<button onclick="geo()">📍 IA</button>
<button onclick="reset()">🇵🇪</button>
</div>

<div id="loading">⏳ Cargando veterinarias...</div>

<div class="app">

<div id="map"></div>

<div id="sidebar">
<div id="info">
<div class="card">🧠 Iniciando IA...</div>
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-9.2,-75],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers=[];

/* DIST */
function dist(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=
Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*
Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

/* FALLBACK SERVERS */
const servers=[
"https://overpass.kumi.systems/api/interpreter",
"https://overpass-api.de/api/interpreter"
];

const query=`
[out:json][timeout:25];
(
node["amenity"="veterinary"](-18,-82,0,-68);
);
out center;
`;

async function loadData(){

for(let url of servers){
try{

const res = await fetch(url,{
method:"POST",
body:query
});

if(!res.ok) continue;

const data = await res.json();

return data;

}catch(e){
console.log("fallback...");
}
}

return null;
}

/* INIT */
loadData().then(data=>{

if(!data){
document.getElementById("info").innerHTML=
"<div class='card'>❌ Error cargando datos</div>";
return;
}

let count=0;

data.elements.forEach(v=>{

const lat=v.lat||v.center?.lat;
const lon=v.lon||v.center?.lon;
if(!lat||!lon) return;

const name=v.tags?.name||"Veterinaria";

let m=L.marker([lat,lon]).addTo(map);

m.data={lat,lon,name,tags:v.tags||{}};

m.on("click",()=>show(m.data));

markers.push(m);
count++;

});

document.getElementById("loading").style.display="none";

document.getElementById("info").innerHTML=
`<div class="card">🧠 IA lista | ${count} veterinarias</div>`;

});

/* SHOW */
function show(v){

map.setView([v.lat,v.lon],15);

document.getElementById("info").innerHTML=`

<div class="card">

<img class="vet-img"
src="https://images.unsplash.com/photo-1583337130417-3346a1be7dee"
>

<h3>🏥 ${v.name}</h3>

📍 ${v.tags["addr:street"]||"No disponible"}<br>
📞 ${v.tags.phone||"No disponible"}<br>
🕒 ${v.tags.opening_hours||"No disponible"}<br>

<a target="_blank"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.name+' '+v.lat+','+v.lon)}">
<button class="btn">🧭 Cómo llegar</button>
</a>

</div>
`;
}

/* SEARCH */
function search(){

let q=document.getElementById("search").value.toLowerCase();

markers.forEach(m=>{
if(m.data.name.toLowerCase().includes(q)){
map.setView([m.data.lat,m.data.lon],15);
show(m.data);
}
});

}

/* GEO */
function geo(){

navigator.geolocation.getCurrentPosition(pos=>{

map.setView([pos.coords.latitude,pos.coords.longitude],14);

L.marker([pos.coords.latitude,pos.coords.longitude])
.addTo(map)
.bindPopup("📍 Tú estás aquí")
.openPopup();

});

}

/* RESET */
function reset(){
map.setView([-9.2,-75],6);
}

</script>

</body>
</html>
