<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PetMarket - Veterinarios Perú</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#panel{
padding:10px;
background:white;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

#panel input{
padding:10px;
width:250px;
border:1px solid #ccc;
border-radius:8px;
}

#panel button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2e7d32;
color:white;
font-weight:bold;
}

#panel button:hover{
opacity:.9;
}

#estadisticas{
padding:10px;
text-align:center;
font-weight:bold;
background:#fff;
}

#map{
height:80vh;
width:100%;
}

</style>

</head>
<body>

<header>
🐶 PetMarket - Veterinarios del Perú
</header>

<div id="panel">

<input
id="buscar"
placeholder="Buscar veterinaria..."
>

<button onclick="buscarVeterinaria()">
🔍 Buscar
</button>

<button onclick="mostrarTodos()">
🇵🇪 Todo Perú
</button>

<button onclick="filtrarCosta()">
🌊 Costa
</button>

<button onclick="filtrarSierra()">
🏔️ Sierra
</button>

<button onclick="filtrarSelva()">
🌴 Selva
</button>

<button onclick="miUbicacion()">
📍 Cerca de mí
</button>

</div>

<div id="estadisticas">
📊 Veterinarias encontradas: <span id="contador">0</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-9.19,-75.01],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

let marcadores = [];

const consulta = `
[out:json][timeout:60];
(
node["amenity"="veterinary"](-18,-82,0,-68);
way["amenity"="veterinary"](-18,-82,0,-68);
relation["amenity"="veterinary"](-18,-82,0,-68);
);
out center;
`;

fetch(
"https://overpass-api.de/api/interpreter",
{
method:"POST",
body:consulta
}
)

.then(res => res.json())

.then(data => {

let total = 0;

data.elements.forEach(vet => {

const lat =
vet.lat ||
vet.center?.lat;

const lon =
vet.lon ||
vet.center?.lon;

if(!lat || !lon) return;

total++;

const tags = vet.tags || {};

let contenido =
`<h3>${tags.name || "Veterinaria"}</h3>`;

for(const clave in tags){

contenido +=
`<b>${clave}</b>: ${tags[clave]}<br>`;

}

const marker =
L.marker([lat,lon])
.addTo(map)
.bindPopup(contenido);

marker.nombre =
(tags.name || "").toLowerCase();

marcadores.push(marker);

});

document.getElementById(
"contador"
).textContent = total;

})

.catch(error => {

console.error(error);

alert(
"Error cargando veterinarios"
);

});

function buscarVeterinaria(){

const texto =
document
.getElementById("buscar")
.value
.toLowerCase();

marcadores.forEach(m => {

if(m.nombre.includes(texto)){

map.setView(
m.getLatLng(),
15
);

m.openPopup();

}

});

}

function miUbicacion(){

navigator.geolocation.getCurrentPosition(

pos => {

const lat =
pos.coords.latitude;

const lon =
pos.coords.longitude;

map.setView(
[lat,lon],
14
);

L.marker([lat,lon])
.addTo(map)
.bindPopup(
"📍 Tu ubicación"
)
.openPopup();

}

);

}

function mostrarTodos(){

map.setView(
[-9.19,-75.01],
6
);

}

function filtrarCosta(){

alert(
"Filtro Costa listo para personalizar."
);

}

function filtrarSierra(){

alert(
"Filtro Sierra listo para personalizar."
);

}

function filtrarSelva(){

alert(
"Filtro Selva listo para personalizar."
);

}

</script>

</body>
</html>
