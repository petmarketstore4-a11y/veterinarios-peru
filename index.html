<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Veterinarios del Perú</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:15px;
font-size:30px;
font-weight:bold;
}

#info{
background:#f5f5f5;
padding:10px;
text-align:center;
font-weight:bold;
}

#map{
height:85vh;
width:100%;
}

</style>

</head>
<body>

<header>
🐶 Veterinarios del Perú
</header>

<div id="info">
Cargando veterinarios...
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-9.19,-75.0152],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

const consulta = `
[out:json][timeout:60];
(
node["amenity"="veterinary"](-18,-82,0,-68);
way["amenity"="veterinary"](-18,-82,0,-68);
relation["amenity"="veterinary"](-18,-82,0,-68);
);
out center;
`;

fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
body:consulta
})
.then(response => response.json())
.then(data => {

let contador = 0;

data.elements.forEach(vet => {

const lat = vet.lat || (vet.center && vet.center.lat);
const lon = vet.lon || (vet.center && vet.center.lon);

if(!lat || !lon) return;

contador++;

const nombre =
vet.tags?.name ||
"Veterinaria";

const telefono =
vet.tags?.phone ||
"Sin teléfono";

const direccion =
vet.tags?.["addr:street"] ||
vet.tags?.address ||
"Dirección no disponible";

L.marker([lat,lon])
.addTo(map)
.bindPopup(`
<h3>${nombre}</h3>
<p><b>Dirección:</b> ${direccion}</p>
<p><b>Teléfono:</b> ${telefono}</p>
`);

});

document.getElementById("info").innerHTML =
"📍 Veterinarios encontrados: " + contador;

})
.catch(error => {

console.error(error);

document.getElementById("info").innerHTML =
"❌ Error cargando veterinarios";

});

</script>

</body>
</html>
